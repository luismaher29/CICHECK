<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pigment Check Lite</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #1f1f1f;
    }

    .container {
      max-width: 720px;
      margin: 60px auto;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: #555;
      line-height: 1.5;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    input {
      flex: 1;
      min-width: 220px;
      padding: 14px 16px;
      border: 1px solid #d0d0d0;
      border-radius: 12px;
      font-size: 1rem;
    }

    button {
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: #111827;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .result-card {
      margin-top: 28px;
      padding: 22px;
      border-radius: 16px;
      border-left: 8px solid #ccc;
      background: #fafafa;
      display: none;
    }

    .result-card.show {
      display: block;
    }

    .level-high {
      border-left-color: #dc2626;
      background: #fef2f2;
    }

    .level-medium {
      border-left-color: #d97706;
      background: #fffbeb;
    }

    .level-low {
      border-left-color: #16a34a;
      background: #f0fdf4;
    }

    .level-unknown {
      border-left-color: #6b7280;
      background: #f3f4f6;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .badge-high {
      background: #fecaca;
      color: #991b1b;
    }

    .badge-medium {
      background: #fde68a;
      color: #92400e;
    }

    .badge-low {
      background: #bbf7d0;
      color: #166534;
    }

    .badge-unknown {
      background: #e5e7eb;
      color: #374151;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-top: 18px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .main-alert {
      font-size: 1.35rem;
      margin: 0 0 8px;
    }

    .code-label {
      margin-top: 16px;
      font-weight: bold;
      color: #333;
    }

    .helper {
      margin-top: 12px;
      font-size: 0.95rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pigment Check Lite</h1>
    <p>
      Escribe un código Color Index para obtener una alerta rápida, explicación y recomendación
      orientada a micropigmentación.
    </p>

    <div class="input-group">
      <input
        type="text"
        id="ciInput"
        placeholder="Ejemplo: CI 77007"
      />
      <button id="analyzeBtn">Analizar</button>
    </div>

    <p class="helper">Prueba con: CI 77007, CI 77891 o CI 77266</p>

    <div id="resultCard" class="result-card">
      <div id="badge" class="badge">Nivel</div>
      <h2 id="alertTitle" class="main-alert">Resultado</h2>
      <div id="codeFound" class="code-label"></div>

      <div class="section-title">Explicación</div>
      <p id="explanationText"></p>

      <div class="section-title">Recomendación</div>
      <p id="recommendationText"></p>
    </div>
  </div>

  <script>
    const rules = {
      "CI 12345": {
        level: "high",
        levelText: "ALTO",
        alert: "Presencia de componente azul",
        explanation:
          "En micropigmentación de labios, este componente puede derivar en tonos fríos no deseados tras la cicatrización.",
        recommendation:
          "No recomendado para procedimientos de labios. Elige pigmentos sin componentes azules o violetas."
      },
      "CI 77891": {
        level: "low",
        levelText: "BAJO",
        alert: "Dióxido de titanio detectado",
        explanation:
          "Puede usarse como opacificante o aclarador dentro de la fórmula del pigmento.",
        recommendation:
          "Evalúa su función dentro de la composición completa antes de tomar una decisión."
      },
      "CI 77266": {
        level: "medium",
        levelText: "MEDIO",
        alert: "Negro de carbón detectado",
        explanation:
          "Debe analizarse según la formulación completa, el procedimiento y el objetivo del resultado.",
        recommendation:
          "Revisa el contexto técnico del pigmento y su uso previsto antes de aplicarlo."
      }
    };

    const ciInput = document.getElementById("ciInput");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const resultCard = document.getElementById("resultCard");
    const badge = document.getElementById("badge");
    const alertTitle = document.getElementById("alertTitle");
    const codeFound = document.getElementById("codeFound");
    const explanationText = document.getElementById("explanationText");
    const recommendationText = document.getElementById("recommendationText");

    function normalizeCI(value) {
      return value.trim().toUpperCase().replace(/\s+/g, " ");
    }

    function renderResult(data, code) {
      resultCard.className = "result-card show";
      badge.className = "badge";

      if (data.level === "high") {
        resultCard.classList.add("level-high");
        badge.classList.add("badge-high");
      } else if (data.level === "medium") {
        resultCard.classList.add("level-medium");
        badge.classList.add("badge-medium");
      } else if (data.level === "low") {
        resultCard.classList.add("level-low");
        badge.classList.add("badge-low");
      } else {
        resultCard.classList.add("level-unknown");
        badge.classList.add("badge-unknown");
      }

      badge.textContent = `Nivel ${data.levelText}`;
      alertTitle.textContent = data.alert;
      codeFound.textContent = `Código analizado: ${code}`;
      explanationText.textContent = data.explanation;
      recommendationText.textContent = data.recommendation;
    }

    function analyzeCI() {
      const userValue = normalizeCI(ciInput.value);

      if (!userValue) {
        renderResult({
          level: "unknown",
          levelText: "NO DEFINIDO",
          alert: "Ingresa un código CI",
          explanation: "No se detectó ningún código para analizar.",
          recommendation: "Escribe un código como CI 77007 y vuelve a intentar."
        }, "Sin código");
        return;
      }

      const result = rules[userValue];

      if (result) {
        renderResult(result, userValue);
      } else {
        renderResult({
          level: "unknown",
          levelText: "SIN REGLA",
          alert: "Código no registrado",
          explanation:
            "Este código aún no está dentro de la base de reglas de esta versión.",
          recommendation:
            "Agrega este código a la base de reglas si deseas analizarlo en futuras versiones."
        }, userValue);
      }
    }

    analyzeBtn.addEventListener("click", analyzeCI);

    ciInput.addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        analyzeCI();
      }
    });
  </script>
</body>
</html>
