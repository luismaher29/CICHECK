<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pigment Check Lite</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #1f1f1f;
    }

    .container {
      max-width: 820px;
      margin: 60px auto;
      background: white;
      padding: 32px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: #555;
      line-height: 1.5;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 14px 16px;
      border: 1px solid #d0d0d0;
      border-radius: 12px;
      font-size: 1rem;
      resize: vertical;
      font-family: Arial, sans-serif;
    }

    button {
      margin-top: 14px;
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      background: #111827;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.92;
    }

    .summary-card {
      margin-top: 28px;
      padding: 20px;
      border-radius: 16px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      display: none;
    }

    .summary-card.show {
      display: block;
    }

    .summary-card.high {
      background: #fef2f2;
      border-color: #fecaca;
    }

    .summary-card.medium {
      background: #fffbeb;
      border-color: #fde68a;
    }

    .summary-card.low {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    .summary-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .summary-main {
      font-size: 1.4rem;
      margin: 0;
    }

    .results {
      margin-top: 24px;
      display: grid;
      gap: 18px;
    }

    .result-card {
      padding: 22px;
      border-radius: 16px;
      border-left: 8px solid #ccc;
      background: #fafafa;
    }

    .level-high {
      border-left-color: #dc2626;
      background: #fef2f2;
    }

    .level-medium {
      border-left-color: #d97706;
      background: #fffbeb;
    }

    .level-low {
      border-left-color: #16a34a;
      background: #f0fdf4;
    }

    .level-unknown {
      border-left-color: #6b7280;
      background: #f3f4f6;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .badge-high {
      background: #fecaca;
      color: #991b1b;
    }

    .badge-medium {
      background: #fde68a;
      color: #92400e;
    }

    .badge-low {
      background: #bbf7d0;
      color: #166534;
    }

    .badge-unknown {
      background: #e5e7eb;
      color: #374151;
    }

    .section-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-top: 18px;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .main-alert {
      font-size: 1.2rem;
      margin: 0 0 8px;
    }

    .code-label {
      margin-top: 10px;
      font-weight: bold;
      color: #333;
    }

    .helper {
      margin-top: 12px;
      font-size: 0.95rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pigment Check Lite</h1>
    <p>
      Escribe uno o varios códigos Color Index para obtener alertas rápidas, explicación y recomendación
      orientadas a micropigmentación.
    </p>

    <div class="input-group">
      <textarea
        id="ciInput"
        placeholder="Ejemplo: CI 77007, CI 77891, CI 77266"
      ></textarea>
    </div>

    <button id="analyzeBtn">Analizar</button>

    <p class="helper">Prueba con varios: CI 77007, CI 77891, CI 77266</p>

    <div id="summaryCard" class="summary-card">
      <div class="summary-title">Evaluación principal</div>
      <h2 id="summaryText" class="summary-main"></h2>
    </div>

    <div id="results" class="results"></div>
  </div>

  <script>
    const rules = {
      "CI 77007": {
        level: "high",
        levelText: "ALTO",
        alert: "Presencia de componente azul",
        explanation:
          "En micropigmentación de labios, este componente puede derivar en tonos fríos no deseados tras la cicatrización.",
        recommendation:
          "No recomendado para procedimientos de labios. Elige pigmentos sin componentes azules o violetas."
      },
      "CI 77891": {
        level: "low",
        levelText: "BAJO",
        alert: "Dióxido de titanio detectado",
        explanation:
          "Puede usarse como opacificante o aclarador dentro de la fórmula del pigmento.",
        recommendation:
          "Evalúa su función dentro de la composición completa antes de tomar una decisión."
      },
      "CI 77266": {
        level: "medium",
        levelText: "MEDIO",
        alert: "Negro de carbón detectado",
        explanation:
          "Debe analizarse según la formulación completa, el procedimiento y el objetivo del resultado.",
        recommendation:
          "Revisa el contexto técnico del pigmento y su uso previsto antes de aplicarlo."
      }
    };

    const ciInput = document.getElementById("ciInput");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const results = document.getElementById("results");
    const summaryCard = document.getElementById("summaryCard");
    const summaryText = document.getElementById("summaryText");

    function normalizeCI(value) {
      return value
        .toUpperCase()
        .replace(/[^A-Z0-9,\s]/g, "")
        .replace(/CI\s*/g, "CI ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function extractCodes(text) {
      const matches = text.match(/CI\s?\d+/g) || [];
      return [...new Set(matches.map(code => normalizeCI(code)))];
    }

    function getLevelPriority(level) {
      if (level === "high") return 3;
      if (level === "medium") return 2;
      if (level === "low") return 1;
      return 0;
    }

    function createCard(data, code) {
      const card = document.createElement("div");
      card.className = `result-card level-${data.level}`;

      const badgeClass =
        data.level === "high"
          ? "badge-high"
          : data.level === "medium"
          ? "badge-medium"
          : data.level === "low"
          ? "badge-low"
          : "badge-unknown";

      card.innerHTML = `
        <div class="badge ${badgeClass}">Nivel ${data.levelText}</div>
        <h2 class="main-alert">${data.alert}</h2>
        <div class="code-label">Código analizado: ${code}</div>

        <div class="section-title">Explicación</div>
        <p>${data.explanation}</p>

        <div class="section-title">Recomendación</div>
        <p>${data.recommendation}</p>
      `;

      return card;
    }

    function analyzeCI() {
      const rawValue = ciInput.value;
      const normalizedText = normalizeCI(rawValue);
      const codes = extractCodes(normalizedText);

      results.innerHTML = "";
      summaryCard.className = "summary-card";
      summaryText.textContent = "";

      if (!codes.length) {
        const noCodeData = {
          level: "unknown",
          levelText: "NO DEFINIDO",
          alert: "No se detectaron códigos",
          explanation: "No se encontró ningún patrón válido tipo CI 12345.",
          recommendation: "Escribe uno o varios códigos como CI 77007, CI 77891 o CI 77266."
        };

        results.appendChild(createCard(noCodeData, "Sin código"));
        summaryCard.classList.add("show");
        summaryText.textContent = "No se encontraron códigos válidos para analizar.";
        return;
      }

      let highestLevel = "low";
      let highestPriority = 1;

      codes.forEach(code => {
        const result = rules[code] || {
          level: "unknown",
          levelText: "SIN REGLA",
          alert: "Código no registrado",
          explanation: "Este código aún no está dentro de la base de reglas de esta versión.",
          recommendation: "Agrega este código a la base de reglas si deseas analizarlo en futuras versiones."
        };

        const priority = getLevelPriority(result.level);

        if (priority > highestPriority) {
          highestPriority = priority;
          highestLevel = result.level;
        }

        results.appendChild(createCard(result, code));
      });

      summaryCard.classList.add("show", highestLevel);

      if (highestLevel === "high") {
        summaryText.textContent = "Riesgo principal detectado: ALTO";
      } else if (highestLevel === "medium") {
        summaryText.textContent = "Riesgo principal detectado: MEDIO";
      } else if (highestLevel === "low") {
        summaryText.textContent = "Riesgo principal detectado: BAJO";
      } else {
        summaryText.textContent = "No hay reglas registradas para los códigos analizados.";
      }
    }

    analyzeBtn.addEventListener("click", analyzeCI);
  </script>
</body>
</html>
